server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Long-lived cache for hashed assets (e.g. main.a3f9b2.js)
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — any unknown URL returns index.html so React Router handles it.
    # Without this, F5 on /boards/abc returns nginx 404 instead of the React app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
